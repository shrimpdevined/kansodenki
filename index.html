<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanso Denki</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Trebuchet MS', 'Lucida Sans', Arial, sans-serif;
        }

        body {
            background-color: #1a1a24;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #ffffff;
            height: 100vh;
            overflow-x: hidden;
        }

        /* --- CRT Scanline Overlay --- */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Creates the horizontal scanlines */
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 999;
            pointer-events: none; /* Lets you click *through* the scanlines */
            animation: screenFlicker 0.15s infinite;
        }

        @keyframes screenFlicker {
            0% { opacity: 0.95; }
            50% { opacity: 1; }
            100% { opacity: 0.95; }
        }

        /* --- Top Bar Layout --- */
        .top-bar {
            display: flex;
            align-items: flex-start;
            padding: 40px;
            gap: 40px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 5rem;
            font-style: italic;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffff;
            letter-spacing: 5px;
            margin-top: 10px; 
            animation: textGlitch 3s infinite; /* Periodic CRT text glitch */
        }

        /* Subtle randomized glitch for the title */
        @keyframes textGlitch {
            0%, 96% { opacity: 1; text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffff; }
            97% { opacity: 0.8; text-shadow: 6px 4px 0px #ff0055, -6px -4px 0px #00ffff; }
            98% { opacity: 0.9; text-shadow: 2px 4px 0px #ff0055, -2px -4px 0px #00ffff; }
            99% { opacity: 0.5; text-shadow: 8px 4px 0px #ff0055, -8px -4px 0px #00ffff; }
            100% { opacity: 1; text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffff; }
        }

        /* --- Hexagon Navigation Styles --- */
        
        .nav-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .hex-wrapper {
            width: 120px;
            height: 104px;
            margin-bottom: 5px;
            text-decoration: none;
            
            filter: drop-shadow(0 0 calc(2px + 20px * var(--glow, 0)) rgba(var(--rgb), calc(0.3 + 0.7 * var(--glow, 0))));
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .hex {
            width: 100%;
            height: 100%;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            
            background-color: rgba(var(--rgb), calc(0.15 + 0.35 * var(--glow, 0)));
            backdrop-filter: blur(4px);
            
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.15s ease;
        }

        .hex span {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(var(--rgb), 1);
            font-size: 0.9rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none; 
        }

        .hex:hover {
            transform: scale(1.05); 
        }

        .sub-menu {
            position: absolute;
            top: 109px;
            display: flex;
            flex-direction: column;
        }

        .sub-wrapper {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none; 
        }

        .h1 { transition-delay: 0.2s; }
        .h2 { transition-delay: 0.1s; }
        .h3 { transition-delay: 0s; }

        .nav-wrapper:hover .sub-wrapper {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .nav-wrapper:hover .h1 { transition-delay: 0.1s; }
        .nav-wrapper:hover .h2 { transition-delay: 0.2s; }
        .nav-wrapper:hover .h3 { transition-delay: 0.3s; }

    </style>
</head>
<body>

    <header class="top-bar">
        
        <!-- Interactive Menu -->
        <nav class="nav-wrapper">
            <div class="hex-wrapper main-wrapper" style="--rgb: 0, 255, 255;">
                <div class="hex"><span>Menu</span></div>
            </div>
            
            <div class="sub-menu">
                <a href="#projects" class="hex-wrapper sub-wrapper h1" style="--rgb: 255, 0, 85;">
                    <div class="hex"><span>Projects</span></div>
                </a>
                <a href="#about" class="hex-wrapper sub-wrapper h2" style="--rgb: 255, 255, 0;">
                    <div class="hex"><span>About</span></div>
                </a>
                <a href="#contact" class="hex-wrapper sub-wrapper h3" style="--rgb: 255, 85, 0;">
                    <div class="hex"><span>Contact</span></div>
                </a>
            </div>
        </nav>

        <!-- Main Title in Kanji -->
        <h1>簡素電気</h1>

    </header>

    <!-- Proximity Glow Script -->
    <script>
        document.addEventListener('mousemove', (e) => {
            const wrappers = document.querySelectorAll('.hex-wrapper');
            
            wrappers.forEach(wrapper => {
                const rect = wrapper.getBoundingClientRect();
                const hexX = rect.left + rect.width / 2;
                const hexY = rect.top + rect.height / 2;
                
                const distX = e.clientX - hexX;
                const distY = e.clientY - hexY;
                const distance = Math.sqrt(distX * distX + distY * distY);
                
                const maxDistance = 250; 
                
                let intensity = 0;
                if (distance < maxDistance) {
                    intensity = 1 - (distance / maxDistance);
                }
                
                wrapper.style.setProperty('--glow', intensity);
            });
        });
    </script>
</body>
</html>
