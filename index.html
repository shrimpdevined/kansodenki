<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanso Denki</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Trebuchet MS', 'Lucida Sans', Arial, sans-serif;
        }

        body {
            background-color: #1a1a24;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #ffffff;
            height: 100vh;
            overflow-x: hidden;
        }

        /* --- Top Bar Layout --- */
        .top-bar {
            display: flex;
            align-items: center; 
            padding: 40px;
            gap: 40px;
            position: relative;
            z-index: 10;
        }

        /* --- Title Styling & True Text Scanlines --- */
        .title-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .ja-title, .en-title {
            position: relative;
            margin: 0;
        }

        /* This applies the scanlines ONLY inside the letters, removing the bounding box */
        .ja-title::after, .en-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            color: transparent;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.45) 50%);
            background-size: 100% 4px;
            background-clip: text;
            -webkit-background-clip: text;
            pointer-events: none;
            z-index: 5;
        }

        .ja-title {
            font-size: 4.5rem;
            font-style: italic;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffff;
            letter-spacing: 5px;
            line-height: 1;
            animation: titleGlitch 20s infinite; 
        }

        .en-title {
            font-size: 1rem;
            font-style: italic;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 2px 2px 0px #ff0055, -2px -2px 0px #00ffff;
            letter-spacing: 12px;
            margin-top: 8px;
            margin-left: 5px;
            animation: subTitleGlitch 20s infinite 0.1s; /* Slightly offset from the main title */
        }

        /* --- Multi-Phase Glitch Cycle (16s stable, 4s of distinct variations) --- */
        @keyframes titleGlitch {
            0%, 82% { 
                opacity: 1; transform: skew(0deg); filter: blur(0px);
                text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffff; 
            }
            /* Variation 1: Color separation jitter */
            83% { transform: translate(-2px, 1px); text-shadow: 8px -2px 0px #ff0055, -8px 4px 0px #00ffff; }
            83.5% { transform: translate(2px, -1px); text-shadow: -4px 6px 0px #ff0055, 6px -2px 0px #00ffff; }
            84% { transform: translate(0, 0); text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffff; }

            /* Variation 2: Magnetic skew and blur */
            87% { transform: skew(15deg); filter: blur(1px); text-shadow: -10px 5px 0px #ff0055, 10px -5px 0px #00ffff; }
            87.5% { opacity: 0.8; transform: skew(-10deg); filter: blur(2px); text-shadow: 12px -4px 0px #ff0055, -12px 6px 0px #00ffff; }
            88% { opacity: 1; transform: skew(0deg); filter: blur(0px); text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffff; }

            /* Variation 3: Hard horizontal tear */
            92% { transform: translate(-8px, 0); text-shadow: 15px 0px 0px #ff0055, -15px 0px 0px #00ffff; }
            92.5% { transform: translate(8px, 0); text-shadow: -15px 0px 0px #ff0055, 15px 0px 0px #00ffff; }
            93% { transform: translate(0, 0); text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffff; }

            /* Variation 4: Vertical bounce */
            97% { transform: translate(0, 5px); text-shadow: 2px -4px 0px #ff0055, -2px 4px 0px #00ffff; }
            97.5% { transform: translate(0, -3px); text-shadow: 6px 8px 0px #ff0055, -6px -8px 0px #00ffff; }
            98%, 100% { opacity: 1; transform: translate(0, 0); text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffff; }
        }

        /* Scaled down version for the subtitle */
        @keyframes subTitleGlitch {
            0%, 82% { 
                opacity: 1; transform: skew(0deg); filter: blur(0px);
                text-shadow: 2px 2px 0px #ff0055, -2px -2px 0px #00ffff; 
            }
            83% { transform: translate(-1px, 1px); text-shadow: 4px -1px 0px #ff0055, -4px 2px 0px #00ffff; }
            83.5% { transform: translate(1px, -1px); text-shadow: -2px 3px 0px #ff0055, 3px -1px 0px #00ffff; }
            84% { transform: translate(0, 0); text-shadow: 2px 2px 0px #ff0055, -2px -2px 0px #00ffff; }
            87% { transform: skew(10deg); filter: blur(1px); text-shadow: -5px 2px 0px #ff0055, 5px -2px 0px #00ffff; }
            87.5% { opacity: 0.8; transform: skew(-5deg); filter: blur(1.5px); text-shadow: 6px -2px 0px #ff0055, -6px 3px 0px #00ffff; }
            88% { opacity: 1; transform: skew(0deg); filter: blur(0px); text-shadow: 2px 2px 0px #ff0055, -2px -2px 0px #00ffff; }
            92% { transform: translate(-4px, 0); text-shadow: 8px 0px 0px #ff0055, -8px 0px 0px #00ffff; }
            92.5% { transform: translate(4px, 0); text-shadow: -8px 0px 0px #ff0055, 8px 0px 0px #00ffff; }
            93% { transform: translate(0, 0); text-shadow: 2px 2px 0px #ff0055, -2px -2px 0px #00ffff; }
            97% { transform: translate(0, 3px); text-shadow: 1px -2px 0px #ff0055, -1px 2px 0px #00ffff; }
            97.5% { transform: translate(0, -2px); text-shadow: 3px 4px 0px #ff0055, -3px -4px 0px #00ffff; }
            98%, 100% { opacity: 1; transform: translate(0, 0); text-shadow: 2px 2px 0px #ff0055, -2px -2px 0px #00ffff; }
        }

        /* --- Hexagon Navigation Styles --- */
        
        .nav-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Increased dimensions for larger text */
        .hex-wrapper {
            width: 130px; 
            height: 113px; /* Mathematically scaled height */
            margin-bottom: 6px;
            text-decoration: none;
            
            filter: drop-shadow(0 0 calc(2px + 20px * var(--glow, 0)) rgba(var(--rgb), calc(0.3 + 0.7 * var(--glow, 0))));
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .hex {
            position: relative;
            width: 100%;
            height: 100%;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            background-color: rgba(var(--rgb), calc(0.15 + 0.35 * var(--glow, 0)));
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.15s ease;
        }

        /* Scanlines applied strictly inside the hexagon shape */
        .hex::after {
            content: " ";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 4px;
            pointer-events: none; 
        }

        .hex:hover {
            transform: scale(1.05); 
        }

        /* Text inside Hexagons */
        .hex-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none; 
            z-index: 2; 
        }

        .ja-text {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(var(--rgb), 1);
            font-size: 1.4rem; /* Significantly larger */
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1.1;
        }

        .en-text {
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 3px rgba(var(--rgb), 0.8);
            font-size: 0.65rem; /* Larger */
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Sub-menu Hiding Logic */
        .sub-menu {
            position: absolute;
            top: 119px; /* Main height (113) + margin (6) */
            display: flex;
            flex-direction: column;
        }

        .sub-wrapper {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none; 
        }

        .h1 { transition-delay: 0.2s; }
        .h2 { transition-delay: 0.1s; }
        .h3 { transition-delay: 0s; }

        .nav-wrapper:hover .sub-wrapper {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .nav-wrapper:hover .h1 { transition-delay: 0.1s; }
        .nav-wrapper:hover .h2 { transition-delay: 0.2s; }
        .nav-wrapper:hover .h3 { transition-delay: 0.3s; }

    </style>
</head>
<body>

    <header class="top-bar">
        
        <!-- Interactive Menu -->
        <nav class="nav-wrapper">
            <div class="hex-wrapper main-wrapper" style="--rgb: 0, 255, 255;">
                <div class="hex">
                    <div class="hex-content">
                        <span class="ja-text">メニュー</span>
                        <span class="en-text">Menu</span>
                    </div>
                </div>
            </div>
            
            <div class="sub-menu">
                <a href="#projects" class="hex-wrapper sub-wrapper h1" style="--rgb: 255, 0, 85;">
                    <div class="hex">
                        <div class="hex-content">
                            <span class="ja-text">計画</span>
                            <span class="en-text">Projects</span>
                        </div>
                    </div>
                </a>
                <a href="#about" class="hex-wrapper sub-wrapper h2" style="--rgb: 255, 255, 0;">
                    <div class="hex">
                        <div class="hex-content">
                            <span class="ja-text">概要</span>
                            <span class="en-text">About</span>
                        </div>
                    </div>
                </a>
                <a href="#contact" class="hex-wrapper sub-wrapper h3" style="--rgb: 255, 85, 0;">
                    <div class="hex">
                        <div class="hex-content">
                            <span class="ja-text">通信</span>
                            <span class="en-text">Contact</span>
                        </div>
                    </div>
                </a>
            </div>
        </nav>

        <!-- Japanese Title with Subtitle - Using data-text for the scanline trick -->
        <div class="title-wrapper">
            <h1 class="ja-title" data-text="簡素電気">簡素電気</h1>
            <h2 class="en-title" data-text="SIMPLE ELECTRIC">SIMPLE ELECTRIC</h2>
        </div>

    </header>

    <!-- Proximity Glow Script -->
    <script>
        document.addEventListener('mousemove', (e) => {
            const wrappers = document.querySelectorAll('.hex-wrapper');
            
            wrappers.forEach(wrapper => {
                const rect = wrapper.getBoundingClientRect();
                const hexX = rect.left + rect.width / 2;
                const hexY = rect.top + rect.height / 2;
                
                const distX = e.clientX - hexX;
                const distY = e.clientY - hexY;
                const distance = Math.sqrt(distX * distX + distY * distY);
                
                const maxDistance = 250; 
                
                let intensity = 0;
                if (distance < maxDistance) {
                    intensity = 1 - (distance / maxDistance);
                }
                
                wrapper.style.setProperty('--glow', intensity);
            });
        });
    </script>
</body>
</html>
