<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanso Denki</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Trebuchet MS', 'Lucida Sans', Arial, sans-serif;
        }

        body {
            background-color: #1a1a24;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #ffffff;
            height: 100vh;
            overflow-x: hidden;
        }

        /* --- Top Bar Layout --- */
        .top-bar {
            display: flex;
            align-items: center; /* Aligns menu and title perfectly on their horizontal center */
            padding: 40px;
            gap: 40px;
            position: relative;
            z-index: 10;
        }

        /* --- Title Styling & Containers --- */
        .title-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Scanlines for the Title */
        .title-wrapper::after {
            content: " ";
            position: absolute;
            inset: -15px; /* Pulls the scanlines out slightly to cover the drop shadows */
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%);
            background-size: 100% 4px;
            pointer-events: none; 
            animation: screenFlicker 0.15s infinite;
            z-index: 20;
        }

        .ja-title {
            font-size: 4.5rem;
            font-style: italic;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffff;
            letter-spacing: 5px;
            line-height: 1;
            animation: titleGlitch 10s infinite; /* 10 second delay for less frequent glitches */
        }

        .en-title {
            font-size: 1rem;
            font-style: italic;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 2px 2px 0px #ff0055, -2px -2px 0px #00ffff; /* Thinner shadow for small text */
            letter-spacing: 12px;
            margin-top: 8px;
            margin-left: 5px;
            animation: subTitleGlitch 10s infinite 0.1s; /* Slightly offset for a tearing effect */
        }

        /* --- Erratic Static Glitch Animations --- */
        @keyframes titleGlitch {
            0%, 93% { opacity: 1; transform: translate(0, 0) skew(0deg); text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffff; }
            94% { opacity: 0.8; transform: translate(-4px, 2px) skew(-5deg); text-shadow: -4px 4px 0px #ff0055, 6px -4px 0px #00ffff; }
            95% { opacity: 0.4; transform: translate(4px, -2px) skew(5deg); text-shadow: 8px -2px 0px #ff0055, -8px 4px 0px #00ffff; }
            96% { opacity: 1; transform: translate(-2px, -2px) skew(0deg); text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffff; }
            97% { opacity: 0.2; transform: translate(2px, 4px) skew(-10deg); text-shadow: -8px 6px 0px #ff0055, 8px -2px 0px #00ffff; }
            98% { opacity: 0.9; transform: translate(-3px, -3px) skew(10deg); text-shadow: 2px 2px 0px #ff0055, -2px -2px 0px #00ffff; }
            99% { opacity: 0.6; transform: translate(2px, 2px) skew(0deg); text-shadow: 6px -4px 0px #ff0055, -6px 4px 0px #00ffff; }
            100% { opacity: 1; transform: translate(0, 0) skew(0deg); text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffff; }
        }

        @keyframes subTitleGlitch {
            0%, 93% { opacity: 1; transform: translate(0, 0) skew(0deg); text-shadow: 2px 2px 0px #ff0055, -2px -2px 0px #00ffff; }
            94% { opacity: 0.5; transform: translate(3px, -1px) skew(5deg); text-shadow: -2px 4px 0px #ff0055, 4px -2px 0px #00ffff; }
            95% { opacity: 0.8; transform: translate(-3px, 2px) skew(-5deg); text-shadow: 4px -2px 0px #ff0055, -4px 4px 0px #00ffff; }
            96% { opacity: 0.2; transform: translate(-1px, 3px) skew(-10deg); text-shadow: -4px 2px 0px #ff0055, 4px -4px 0px #00ffff; }
            97%, 100% { opacity: 1; transform: translate(0, 0) skew(0deg); text-shadow: 2px 2px 0px #ff0055, -2px -2px 0px #00ffff; }
        }

        @keyframes screenFlicker {
            0% { opacity: 0.95; }
            50% { opacity: 1; }
            100% { opacity: 0.95; }
        }

        /* --- Hexagon Navigation Styles --- */
        
        .nav-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .hex-wrapper {
            width: 120px;
            height: 104px;
            margin-bottom: 5px;
            text-decoration: none;
            
            filter: drop-shadow(0 0 calc(2px + 20px * var(--glow, 0)) rgba(var(--rgb), calc(0.3 + 0.7 * var(--glow, 0))));
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .hex {
            position: relative;
            width: 100%;
            height: 100%;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            
            background-color: rgba(var(--rgb), calc(0.15 + 0.35 * var(--glow, 0)));
            backdrop-filter: blur(4px);
            
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.15s ease;
        }

        /* Scanlines applied strictly inside the hexagon shape */
        .hex::after {
            content: " ";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 4px;
            pointer-events: none; 
            animation: screenFlicker 0.15s infinite;
        }

        .hex:hover {
            transform: scale(1.05); 
        }

        /* Text inside Hexagons */
        .hex-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none; 
            z-index: 2; /* Keeps text slightly above the scanline overlay */
        }

        .ja-text {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(var(--rgb), 1);
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .en-text {
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 3px rgba(var(--rgb), 0.8);
            font-size: 0.55rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Sub-menu Hiding Logic */
        .sub-menu {
            position: absolute;
            top: 109px;
            display: flex;
            flex-direction: column;
        }

        .sub-wrapper {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none; 
        }

        .h1 { transition-delay: 0.2s; }
        .h2 { transition-delay: 0.1s; }
        .h3 { transition-delay: 0s; }

        .nav-wrapper:hover .sub-wrapper {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .nav-wrapper:hover .h1 { transition-delay: 0.1s; }
        .nav-wrapper:hover .h2 { transition-delay: 0.2s; }
        .nav-wrapper:hover .h3 { transition-delay: 0.3s; }

    </style>
</head>
<body>

    <header class="top-bar">
        
        <!-- Interactive Menu -->
        <nav class="nav-wrapper">
            <div class="hex-wrapper main-wrapper" style="--rgb: 0, 255, 255;">
                <div class="hex">
                    <div class="hex-content">
                        <span class="ja-text">メニュー</span>
                        <span class="en-text">Menu</span>
                    </div>
                </div>
            </div>
            
            <div class="sub-menu">
                <a href="#projects" class="hex-wrapper sub-wrapper h1" style="--rgb: 255, 0, 85;">
                    <div class="hex">
                        <div class="hex-content">
                            <span class="ja-text">計画</span>
                            <span class="en-text">Projects</span>
                        </div>
                    </div>
                </a>
                <a href="#about" class="hex-wrapper sub-wrapper h2" style="--rgb: 255, 255, 0;">
                    <div class="hex">
                        <div class="hex-content">
                            <span class="ja-text">概要</span>
                            <span class="en-text">About</span>
                        </div>
                    </div>
                </a>
                <a href="#contact" class="hex-wrapper sub-wrapper h3" style="--rgb: 255, 85, 0;">
                    <div class="hex">
                        <div class="hex-content">
                            <span class="ja-text">通信</span>
                            <span class="en-text">Contact</span>
                        </div>
                    </div>
                </a>
            </div>
        </nav>

        <!-- Japanese Title with Subtitle -->
        <div class="title-wrapper">
            <h1 class="ja-title">簡素電気</h1>
            <h2 class="en-title">SIMPLE ELECTRIC</h2>
        </div>

    </header>

    <!-- Proximity Glow Script -->
    <script>
        document.addEventListener('mousemove', (e) => {
            const wrappers = document.querySelectorAll('.hex-wrapper');
            
            wrappers.forEach(wrapper => {
                const rect = wrapper.getBoundingClientRect();
                const hexX = rect.left + rect.width / 2;
                const hexY = rect.top + rect.height / 2;
                
                const distX = e.clientX - hexX;
                const distY = e.clientY - hexY;
                const distance = Math.sqrt(distX * distX + distY * distY);
                
                const maxDistance = 250; 
                
                let intensity = 0;
                if (distance < maxDistance) {
                    intensity = 1 - (distance / maxDistance);
                }
                
                wrapper.style.setProperty('--glow', intensity);
            });
        });
    </script>
</body>
</html>
